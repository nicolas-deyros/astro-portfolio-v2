name: Fallow analysis

on:
  push:
    branches: [master]
  pull_request:

jobs:
  fallow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write        # needed for PR comments
      security-events: write      # needed for SARIF upload to Code Scanning

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # required for --changed-since / trend tracking

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        # Required so Fallow can resolve tsconfig.json `extends: astro/tsconfigs/strict`
        # and follow the full path-alias chain (@components/*, @lib/*, @/*, etc.)

      - uses: fallow-rs/fallow@v2
        with:
          format: sarif
          fail-on-issues: false       # warn-first: never block merges at this stage
          auto-changed-since: true    # PR-scoped by default; full scan on push to master
          annotations: true           # inline annotations on PR diff (no Advanced Security needed)
          comment: true               # rich summary comment posted on PRs
          score: true                 # include health score (0-100 + letter grade) in comment
          upload-sarif: true          # fallow@v2 handles the upload; no separate upload-sarif step needed
